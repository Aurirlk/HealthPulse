# ============================================================
# 个人健康管理系统 - 完整配置文件
# ============================================================

# 服务配置
server:
  port: ${SERVER_PORT:21090}
  servlet:
    context-path: ${SERVER_CONTEXT:/api/personal-health/v1.0}

# API地址前缀，用于拦截器放行
my-server:
  api-context-path: ${SERVER_CONTEXT:/api/personal-health/v1.0}

# Spring 配置
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:personal-health}?characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: cn.kmbeast.pojo.entity
  configuration:
    map-underscore-to-camel-case: true

# ============================================================
# DeepSeek AI 配置（chat + embedding 共用 API Key）
# ============================================================
deepseek:
  api-key: ${DEEPSEEK_API_KEY:sk-e7af257b13b94373a4340d23ec4205f5}
  api-url: ${DEEPSEEK_API_URL:https://api.deepseek.com/v1/chat/completions}
  model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
  connect-timeout: ${AI_CONNECT_TIMEOUT:30000}
  read-timeout: ${AI_READ_TIMEOUT:60000}

# ============================================================
# AI 服务配置
# ============================================================
ai:
  max-history-rounds: ${AI_MAX_HISTORY_ROUNDS:10}
  max-tokens: ${AI_MAX_TOKENS:4096}
  vector-cache-dir: ${VECTOR_CACHE_DIR:./vector_cache}

# ============================================================
# CRM 模块配置
# ============================================================
crm:
  # SQLite 本地数据库路径
  sqlite:
    db-path: ${CRM_SQLITE_PATH:./crm_data/chat_history.db}
  # 本地向量数据库存储路径
  vectordb:
    store-path: ${CRM_VECTOR_PATH:./crm_data/vector_store}
  # 嵌入向量模型配置
  embedding:
    model: ${EMBEDDING_MODEL:text-embedding-3-small}
    api-url: ${EMBEDDING_API_URL:https://api.deepseek.com/v1/embeddings}
  # 对外 API 认证密钥（向量库更新等）
  api-key: ${CRM_API_KEY:crm-default-key}
  # ReAct Agent 配置
  react:
    max-rounds: ${CRM_MAX_REACT_ROUNDS:5}
    temperature: ${CRM_TEMPERATURE:0.3}
    stream-temperature: ${CRM_STREAM_TEMPERATURE:0.7}
    tool-timeout-seconds: ${CRM_TOOL_TIMEOUT_SECONDS:30}
    # 自定义 System Prompt（为空则使用内置默认值）
    prompt: ${CRM_REACT_PROMPT:}

# 日志配置
logging:
  level:
    cn.kmbeast: debug
    cn.kmbeast.service.impl.AiServiceImpl: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
